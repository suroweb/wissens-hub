services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wissenshub-sql
    platform: linux/amd64
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=WissensHub_Dev2026!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

volumes:
  sqldata:
