name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test-spfx:
    name: Build & Test SPFx
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spfx
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: spfx/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and test (production)
        run: npx heft test --clean --production

  build-and-test-api:
    name: Build & Test API
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'WissensHub_Dev2026!'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'WissensHub_Dev2026!' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/WissensHub.Tests --no-build --configuration Release -e AZURE_FUNCTIONS_ENVIRONMENT=Development
